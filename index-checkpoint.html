<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f7fb;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            grid-column: span 2;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Titanic Survival Prediction</h1>
    <p>Enter passenger details to predict survival</p>
</header>

<div class="container">
    <h2>Passenger Information</h2>
    <form action="/predict" method="POST"></form>
        <div>
            <label>Age</label>
            <input type="number" id="age" required>
        </div>

        <div>
            <label>Fare</label>
            <input type="number" id="fare" required>
        </div>

        <div>
            <label>Sex</label>
            <select id="sex">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div>
            <label>Passenger Class</label>
            <select id="pclass">
                <option value="1">1st Class</option>
                <option value="2">2nd Class</option>
                <option value="3">3rd Class</option>
            </select>
        </div>

        <div>
            <label>Siblings/Spouses</label>
            <input type="number" id="sibsp" required>
        </div>

        <div>
            <label>Parents/Children</label>
            <input type="number" id="parch" required>
        </div>

        <button type="submit">Predict Survival</button>
    </form>

    <div class="result" id="result"></div>
</div>

<script>
    document.getElementById("predictionForm").addEventListener("submit", function(e) {
        e.preventDefault();

        // Dummy prediction logic (replace with Flask API later)
        let age = document.getElementById("age").value;
        let sex = document.getElementById("sex").value;

        let resultText = "";

        if (sex === "female" && age < 50) {
            resultText = "High chance of Survival ✅";
        } else {
            resultText = "Low chance of Survival ❌";
        }

        document.getElementById("result").innerText = resultText;
    });
</script>

</body>
</html>
