<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Titanic AI Predictor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1f4037, #99f2c8);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      color: white;
      backdrop-filter: blur(10px);
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00c6ff;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0072ff;
    }

    #result {
      margin-top: 15px;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🚢 Titanic AI Predictor</h2>

  <select id="pclass">
    <option value="1">1st Class</option>
    <option value="2">2nd Class</option>
    <option value="3">3rd Class</option>
  </select>

  <select id="sex">
    <option value="0">Male</option>
    <option value="1">Female</option>
  </select>

  <input type="number" id="age" placeholder="Age">
  <input type="number" id="sibsp" placeholder="Siblings">
  <input type="number" id="parch" placeholder="Parents">
  <input type="number" id="fare" placeholder="Fare">

  <button onclick="predict()">🚀 Predict Survival</button>

  <div id="result"></div>
</div>

<script>
async function predict() {

  const data = {
    pclass: document.getElementById("pclass").value,
    sex: document.getElementById("sex").value,
    age: document.getElementById("age").value,
    sibsp: document.getElementById("sibsp").value,
    parch: document.getElementById("parch").value,
    fare: document.getElementById("fare").value
  };

  try {
    const response = await fetch("YOUR_API_URL_HERE", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
      "Prediction: " + result.prediction;

  } catch (error) {
    document.getElementById("result").innerHTML =
      "Error connecting to API";
  }
}
</script>

</body>
</html>
